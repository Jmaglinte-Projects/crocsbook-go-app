syntax = "proto3";

package project;

option go_package = "github.com/Jmaglinte-Projects/crocsbook-go-app/infra/grpc/protos";

import "google/protobuf/timestamp.proto"; 

service ProjectService {
  rpc ShowProjects (ShowProjectsIn) returns (ShowProjectsOut); 
  rpc ShowProject (ShowProjectIn) returns (ShowProjectOut);
  rpc CreateProject (CreateProjectIn) returns (CreateProjectOut);
  rpc UpdateProject (UpdateProjectIn) returns (UpdateProjectOut);
  rpc RemoveProject (RemoveProjectIn) returns (RemoveProjectOut);
  rpc CountProjectLikes (CountProjectLikesIn) returns (CountProjectLikesOut);
  rpc LikeProject (LikeProjectIn) returns (LikeProjectOut);
  rpc UnlikeProject (UnlikeProjectIn) returns (UnlikeProjectOut);
  rpc CheckProjectLiked (CheckProjectLikedIn) returns (CheckProjectLikedOut);
}

message ShowProjectsIn {}
message ShowProjectsOut {
  repeated Project items = 1;
  uint64 total = 2;
}

message ShowProjectIn {
  string project_id = 1;
}
message ShowProjectOut {
  Project item = 1;
}

message CreateProjectIn {
  string project_user_id = 1;
  string name = 2;
  string description = 3;
  string location = 5;
  int64 cost = 6;
  google.protobuf.Timestamp start_date = 7;
  google.protobuf.Timestamp completion_date = 8;

  bytes thumbnail_content = 9;
}
message CreateProjectOut {}

message UpdateProjectIn {
  string project_id = 1;

  string name = 2;
  string description = 3;
  string location = 5;
  int64 cost = 6;
  google.protobuf.Timestamp start_date = 8;
  google.protobuf.Timestamp completion_date = 9;

  bytes thumbnail_content = 10;
}
message UpdateProjectOut {}

message RemoveProjectIn {
  string project_id = 1;
}
message RemoveProjectOut {}

message CountProjectLikesIn {
  string project_id = 1;
}
message CountProjectLikesOut {
  uint64 count = 1;
}

message LikeProjectIn {
  string project_id = 1;
  string user_id = 2;
}
message LikeProjectOut {}

message UnlikeProjectIn {
  string project_id = 1;
  string user_id = 2;
}
message UnlikeProjectOut {}

message CheckProjectLikedIn {
  string project_id = 1;
  string user_id = 2;
}
message CheckProjectLikedOut {
  bool liked = 1;
}

message Project {
  string project_id = 1;
  string project_user_id = 2;
  string name = 3;
  string description = 4;
  string thumbnail_key = 5;
  string location = 6;
  int64 cost = 7;
  google.protobuf.Timestamp start_date = 8;
  google.protobuf.Timestamp completion_date = 9;
  google.protobuf.Timestamp created_time = 10;
  google.protobuf.Timestamp updated_time = 11;

  string thumbnail_url = 12;
}