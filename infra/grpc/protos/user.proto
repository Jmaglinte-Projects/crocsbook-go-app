syntax = "proto3";

package user;

option go_package = "github.com/Jmaglinte-Users/crocsbook-go-app/infra/grpc/protos";

import "google/protobuf/timestamp.proto"; 

service UserService {
  rpc ShowUsers (ShowUsersIn) returns (ShowUsersOut); 
  rpc ShowUser (ShowUserIn) returns (ShowUserOut);
  rpc CreateUser (CreateUserIn) returns (CreateUserOut);
  rpc UpdateUser (UpdateUserIn) returns (UpdateUserOut);
  rpc RemoveUser (RemoveUserIn) returns (RemoveUserOut);
}

message ShowUsersIn {}
message ShowUsersOut {
  repeated ViewUser items = 1;
  uint64 total = 2;
}

message ShowUserIn {
  string user_id = 1;
}
message ShowUserOut {
  ViewUser item = 1;
}

message CreateUserIn {
  string email = 1;
  Gender gender = 2;
  string nickname = 3;
  string username = 4;
  string password = 5;
}
message CreateUserOut {}

message UpdateUserIn {
  string user_id = 1;

  string email = 2;
  string password = 3;
  Gender gender = 4;
  string nickname = 5;
  
  bytes image_data = 6;
}
message UpdateUserOut {}

message RemoveUserIn {
  string user_id = 1;
}
message RemoveUserOut {}

message ViewUser {
  User user = 1;
}

message User {
  string user_id = 1;
  string email = 2;
  Gender gender = 3;
  string profile_url = 4;
  string nickname = 5;
  string username = 6;
  string password = 7;
  google.protobuf.Timestamp created_time = 8;
  google.protobuf.Timestamp updated_time = 9;
}

enum Gender {
  GENDER_UNSPECIFIED = 0;
  GENDER_MALE = 1;
  GENDER_FEMALE = 2;
}


