syntax = "proto3";

package post;

option go_package = "github.com/Jmaglinte-Projects/crocsbook-go-app/infra/grpc/protos";

import "google/protobuf/timestamp.proto"; 

service PostService {
  rpc ShowPosts (ShowPostsIn) returns (ShowPostsOut); 
  rpc ShowPost (ShowPostIn) returns (ShowPostOut);
  rpc CreatePost (CreatePostIn) returns (CreatePostOut);
  rpc UpdatePost (UpdatePostIn) returns (UpdatePostOut);
  rpc RemovePost (RemovePostIn) returns (RemovePostOut);

  rpc ReactToPost (ReactToPostIn) returns (ReactToPostOut);

  rpc ShowPostByProjectId (ShowPostByProjectIdIn) returns (ShowPostByProjectIdOut);
}

message ShowPostsIn {
  optional PostFilter filter = 1;
}
message ShowPostsOut {
  repeated Post items = 1;
  uint64 total = 2;
}

message ShowPostIn {
  string post_id = 1;
}
message ShowPostOut {
  Post item = 1;
}

message CreatePostIn {
  string post_project_id = 1;
  string content = 2;
  PostVisibility visibility = 3;

  repeated bytes images = 4;
}
message CreatePostOut {}

message UpdatePostIn {
  string post_id = 1;
  string post_project_id = 2;

  string content = 3;
  PostVisibility visibility = 4; 

  
}
message UpdatePostOut {}

message RemovePostIn {
  string post_id = 1;
}
message RemovePostOut {}

message ReactToPostIn {
  string post_id = 1;
  string user_id = 2;
  PostReactionType reaction_type = 3;
}
message ReactToPostOut {}


message ShowPostByProjectIdIn {
  string project_id = 1;

  optional PostFilter filter = 2;
}
message ShowPostByProjectIdOut {
  repeated Post items = 1;
  uint64 total = 2;
}

message PostFilter {
  optional google.protobuf.Timestamp created_time = 1;

  PostSortKey sort_key = 2;
  int64 size = 3;
  optional int64 offset = 4;
}

enum PostSortKey {
  PostSortKey_CreatedTime_ASC = 0;
  PostSortKey_CreatedTime_DESC = 1;
}

enum PostReactionType {
  PostReactionType_Like = 0;
  PostReactionType_Heart = 1;
}

message Post {
  string post_id = 1;
  string post_project_id = 2;
  string content = 3;
  PostVisibility visibility = 4;
  google.protobuf.Timestamp created_time = 5;
  google.protobuf.Timestamp updated_time = 6;
  Post_Project project = 7;
  repeated Post_Media media_list = 8;

  uint64 post_count = 9;  
	google.protobuf.Timestamp last_post_time = 10;
  uint64 post_reaction_count = 11;
  bool has_reacted = 12;
}
 
message Post_Project {
  string project_id = 1;
  string project_user_id = 2;
  string name = 3;
  string description = 4;
  string thumbnail_key = 5;
  string location = 6;
  int64 cost = 7;
  google.protobuf.Timestamp start_date = 8;
  google.protobuf.Timestamp completion_date = 9;
  google.protobuf.Timestamp created_time = 10;
  google.protobuf.Timestamp updated_time = 11;
  string thumbnail_url = 12;
}

message Post_Media {
  string media_id = 1;
  string media_post_id = 2;
  string object_key = 3;
  string type = 4;
  google.protobuf.Timestamp created_time = 5;

  string thumbnail_url = 6;
}

enum PostVisibility {
  PostVisibility_UNSPECIFIED = 0;
  PostVisibility_Public = 1;
  PostVisibility_Private = 2;
}
 